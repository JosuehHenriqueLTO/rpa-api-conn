services:
  backend:
    build: ./backend
    container_name: django_backend
    volumes:
      - ./backend/db.sqlite3:/app/db.sqlite3
      - media_data:/app/media
      - static_data:/app/staticfiles
    env_file:
      - .env
    environment:
      DEBUG: "false"
    expose:
      - 8000
    healthcheck:
      test: ["CMD", "python", "manage.py", "check"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      - backend

  rpa:
    build: ./rpa
    container_name: rpa_runner
    volumes:
      - ./rpa/data:/rpa/data
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
  
  frontend:
    build: ./frontend
    container_name: react_frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DEBUG: "false"

volumes:
  media_data:
  static_data:

